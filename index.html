<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operación Bigotes</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Logo de Operación Bigotes" class="logo">
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Requisitos</a>
            <a href="#">Gatos en adopción</a>
            <a href="#">FAQ</a>
            <a href="#">Formulario</a>
        </nav>
        <button class="btn-create-account">Crear cuenta</button>
    </header>
    <main>
        <section id="hero">
            <div id="hero-text">
                <h1>Encuentra a tu amigo fiel</h1>
                <p>Conecta adoptantes con refugios y hogares de tránsito</p>
                <button id="btn-adopt">Adoptar</button> 
            </div>
            <div id="hero-image-container">
                <img src="images/hero-gato.png" alt="">
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
